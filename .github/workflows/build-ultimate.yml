name: Build Ultimate

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}

    steps:
    - uses: actions/checkout@v3
    - id: check
      run: echo "should-build=true" >> $GITHUB_OUTPUT

  build-windows:
    needs: prepare
    if: needs.prepare.outputs.should-build == 'true'
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: electron-app/package-lock.json

    - name: Install dependencies
      working-directory: electron-app
      shell: bash
      run: npm install --force

    - name: Build application
      working-directory: electron-app
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CSC_IDENTITY_AUTO_DISCOVERY: false
      run: |
        npm run build-win -- --publish never

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: windows-installer
        path: electron-app/dist/*.exe
        retention-days: 7

  build-cross-platform:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 20.x

    - uses: docker/setup-buildx-action@v2

    - name: Build in Docker
      run: |
        docker run --rm \
          -v "${PWD}/electron-app":/project \
          -w /project \
          electronuserland/builder:wine \
          /bin/bash -c "npm install --force && npm run build-win -- --publish never"

    - name: Upload Docker build
      uses: actions/upload-artifact@v3
      with:
        name: docker-installer
        path: electron-app/dist/*.exe

  release:
    needs: [build-windows, build-cross-platform]
    runs-on: ubuntu-latest
    if: success()

    steps:
    - uses: actions/download-artifact@v3
      with:
        name: windows-installer
        path: dist/

    - name: List artifacts
      run: ls -la dist/

    - name: Create release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}