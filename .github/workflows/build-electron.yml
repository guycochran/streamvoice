name: Build Electron App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      working-directory: electron-app
      run: |
        # Clean install without package-lock
        if (Test-Path package-lock.json) {
          Remove-Item package-lock.json
        }
        npm install

    - name: Prepare Whisper assets
      working-directory: electron-app
      run: npm run prepare-whisper

    - name: Prepare ffmpeg assets
      working-directory: electron-app
      run: npm run prepare-ffmpeg

    - name: Build Electron app
      working-directory: electron-app
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false
      run: npx electron-builder --win --publish never

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: StreamVoice-Windows
        path: electron-app/dist/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: StreamVoice-Windows/*.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
