<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVoice - Voice Control for OBS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9b59b6">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ StreamVoice</h1>
            <p class="tagline">Control OBS with your voice</p>
        </header>

        <main>
            <div class="status-card">
                <div id="connection-status" class="status disconnected">
                    <span class="status-dot"></span>
                    <span class="status-text">Disconnected</span>
                </div>
                <div style="margin-top: 10px; font-size: 12px; color: #666; text-align: center;">
                    <span id="connection-details">WebSocket: ws://localhost:8090</span>
                </div>
            </div>

            <div class="voice-control">
                <button id="voice-button" class="voice-button" disabled>
                    <svg class="mic-icon" viewBox="0 0 24 24" width="48" height="48">
                        <path fill="currentColor" d="M12,2A3,3 0 0,1 15,5V11A3,3 0 0,1 12,14A3,3 0 0,1 9,11V5A3,3 0 0,1 12,2M19,11C19,14.53 16.39,17.44 13,17.93V21H11V17.93C7.61,17.44 5,14.53 5,11H7A5,5 0 0,0 12,16A5,5 0 0,0 17,11H19Z"/>
                    </svg>
                    <span class="button-text">Hold to Speak</span>
                </button>
                <div id="voice-feedback" class="voice-feedback hidden">
                    <div class="voice-wave">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                    <p class="listening-text">Listening...</p>
                </div>
            </div>

            <div class="transcript-area">
                <p id="transcript" class="transcript">Press and hold the button to speak</p>
                <p id="result" class="result"></p>
            </div>

            <div class="command-history">
                <h3>Recent Commands</h3>
                <ul id="history-list" class="history-list">
                    <!-- Commands will be added here -->
                </ul>
            </div>

            <div class="quick-commands">
                <h3>Quick Commands</h3>
                <div class="command-grid">
                    <button class="quick-cmd" data-command="switch to gameplay">Gameplay</button>
                    <button class="quick-cmd" data-command="switch to just chatting">Just Chatting</button>
                    <button class="quick-cmd" data-command="switch to break">BRB</button>
                    <button class="quick-cmd" data-command="start recording">Start Recording</button>
                    <button class="quick-cmd" data-command="mute my mic">Mute Mic</button>
                    <button class="quick-cmd" data-command="emergency privacy">Privacy Mode</button>
                </div>
            </div>
        </main>

        <footer>
            <p>StreamVoice v0.2.0 - <a href="#" id="show-commands">View all commands</a></p>
        </footer>
    </div>

    <!-- Commands Modal -->
    <div id="commands-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Available Voice Commands</h2>
            <button class="modal-close">&times;</button>
            <div id="commands-list" class="commands-list">
                <!-- Commands will be populated here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
